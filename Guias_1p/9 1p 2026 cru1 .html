<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crucigrama: Ácidos, Bases y Perspectivas</title>
    <style>
        :root { --primario: #3f51b5; --secundario: #9c27b0; --fondo: #f3e5f5; --texto: #212121; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--texto); }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(63, 81, 181, 0.2); max-width: 950px; width: 100%; }
        h1 { color: var(--primario); text-align: center; margin-bottom: 5px; }
        h4 { text-align: center; color: var(--secundario); margin-top: 0; font-style: italic; }
        .grid-container { display: flex; justify-content: center; margin: 25px 0; }
        .grid { display: grid; grid-template-columns: repeat(15, 34px); grid-template-rows: repeat(15, 34px); gap: 2px; background: #d1c4e9; border: 4px solid var(--primario); }
        .cell { background: #b39ddb; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; position: relative; }
        .cell.active { background: white; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 18px; font-weight: bold; text-transform: uppercase; background: transparent; color: var(--primario); }
        .cell input:focus { background: #ede7f6; outline: none; }
        .num { position: absolute; top: 1px; left: 2px; font-size: 10px; color: #7e57c2; pointer-events: none; }
        .clues { display: flex; gap: 20px; margin-top: 25px; }
        .clue-col { flex: 1; background: #fdfbff; padding: 15px; border-radius: 12px; border-top: 5px solid var(--secundario); }
        h3 { color: var(--primario); margin-top: 0; }
        li { font-size: 13.5px; margin-bottom: 12px; list-style: none; }
        #win-msg { display: none; text-align: center; color: #4caf50; font-weight: bold; padding: 20px; border: 3px solid #4caf50; border-radius: 15px; margin-top: 20px; font-size: 1.2em; background: #e8f5e9; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ácidos y Bases: Teorías y Empatía</h1>
    <h4>Cediendo protones y aceptando electrones</h4>

    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="win-msg">¡Excelente! Has comprendido que, tanto en la química como en la vida, intercambiar apoyo es fundamental.</div>

    <div class="clues">
        <div class="clue-col">
            <h3>Horizontales</h3>
            <ul id="hor-clues"></ul>
        </div>
        <div class="clue-col">
            <h3>Verticales</h3>
            <ul id="ver-clues"></ul>
        </div>
    </div>
</div>

<script>
    const data = [
        [1, 2, "BRONSTED", "Teoría que define ácidos como donadores de protones.", "H"],
        [4, 0, "CONJUGADO", "El par que se forma cuando un ácido cede un protón.", "H"],
        [6, 5, "LEWIS", "Teoría basada en compartir pares de electrones.", "H"],
        [9, 3, "AMONIACO", "Sustancia que actúa como base al recibir un protón.", "H"],
        [11, 7, "ACEPTAR", "Acción de la base de Lewis respecto a los electrones.", "H"],
        [13, 1, "RESPETO", "Valor de escuchar diferentes perspectivas teóricas.", "H"],
        [0, 5, "PROTON", "Ion hidrógeno (H+) que se intercambia en Brönsted.", "V"],
        [2, 10, "ELECTRON", "Lo que se comparte en la teoría más amplia de Lewis.", "V"],
        [3, 3, "ACIDO", "Sustancia que cede protones o acepta electrones.", "V"],
        [5, 12, "BASE", "Sustancia que recibe protones o cede electrones.", "V"],
        [7, 1, "EMPATIA", "Valor de dar y recibir apoyo, como los pares de ácido-base.", "V"],
        [1, 14, "TEORIA", "Conjunto de ideas que explican un fenómeno químico.", "V"],
        [9, 9, "DONAR", "Acción del ácido de Lewis respecto a los electrones.", "V"],
        [10, 5, "PARES", "Relación entre dos sustancias que difieren en un H+.", "V"],
        [12, 13, "DAR", "En Brönsted, es lo que hace el ácido con su protón.", "V"]
    ];

    const gridDiv = document.getElementById('grid');
    for(let r=0; r<15; r++) {
        for(let c=0; c<15; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `c-${r}-${c}`;
            gridDiv.appendChild(cell);
        }
    }

    data.forEach((item, index) => {
        let [r, c, word, clue, dir] = item;
        const list = document.getElementById(dir === 'H' ? 'hor-clues' : 'ver-clues');
        const li = document.createElement('li');
        li.innerHTML = `<b>${index + 1}.</b> ${clue}`;
        list.appendChild(li);

        for(let i=0; i<word.length; i++) {
            let currR = dir === 'H' ? r : r + i;
            let currC = dir === 'H' ? c + i : c;
            let cell = document.getElementById(`c-${currR}-${currC}`);
            cell.classList.add('active');
            if(!cell.querySelector('input')) {
                const input = document.createElement('input');
                input.maxLength = 1;
                input.dataset.answer = word[i];
                cell.appendChild(input);
                const num = document.createElement('span');
                num.className = 'num';
                num.innerText = index + 1;
                cell.appendChild(num);
            }
        }
    });

    gridDiv.addEventListener('input', (e) => {
        e.target.style.color = e.target.value.toUpperCase() === e.target.dataset.answer ? "#3f51b5" : "#e91e63";
        const inputs = document.querySelectorAll('input');
        if(Array.from(inputs).every(i => i.value.toUpperCase() === i.dataset.answer)) {
            document.getElementById('win-msg').style.display = 'block';
        }
    });
</script>
</body>
</html>
