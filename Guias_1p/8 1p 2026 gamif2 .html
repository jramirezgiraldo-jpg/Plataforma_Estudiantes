<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVA: El Arte de Enlazarnos - Grado 8°</title>
    <style>
        :root {
            --primary: #4a148c;
            --secondary: #00796b;
            --accent: #ff9800;
            --bg: #f5f5f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        /* 1. Registro y Persistencia */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; color: white;
        }

        .login-card {
            background: var(--white);
            color: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%; max-width: 400px;
        }

        /* Header Fijo */
        header {
            position: fixed;
            top: 0; width: 100%;
            background: var(--white);
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 900; box-sizing: border-box;
        }

        .user-info { font-weight: bold; color: var(--primary); }
        .score-display { 
            background: var(--accent); 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: bold; color: white;
        }

        /* 2. Estructura de Actividades (Scrolling) */
        main {
            margin-top: 80px;
            padding: 20px;
            max-width: 800px;
            margin-left: auto; margin-right: auto;
        }

        .activity-box {
            background: var(--white);
            margin-bottom: 40px;
            padding: 25px;
            border-radius: 12px;
            border-left: 10px solid var(--secondary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .activity-box.completed { border-left-color: #4caf50; }

        .scrambled {
            display: block;
            background: #f3e5f5;
            padding: 15px;
            margin: 15px 0;
            font-size: 1.5rem;
            letter-spacing: 8px;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            border-radius: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled { background: #ccc; }

        /* 3. Gamificación */
        .insignia {
            display: inline-block;
            width: 45px; height: 45px;
            line-height: 45px;
            border-radius: 50%;
            text-align: center;
            margin-left: 10px;
            font-weight: bold;
            border: 2px solid rgba(0,0,0,0.1);
        }
        .ins-Au { background: #ffd700; color: #333; }
        .ins-Ag { background: #c0c0c0; color: #333; }
        .ins-Fe { background: #cd7f32; color: #fff; }

        .feedback { margin-top: 10px; font-weight: bold; }
        .hint { font-size: 0.9rem; color: #666; font-style: italic; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>⚛️ Mercado Químico</h2>
            <p>Aprende el arte de dar y compartir electrones</p>
            <input type="text" id="name" placeholder="Tu Nombre">
            <input type="text" id="lastname" placeholder="Tu Apellido">
            <button onclick="doLogin()">Entrar al Laboratorio</button>
        </div>
    </div>

    <header>
        <div class="user-info">👤 Estudiante: <span id="ui-user">---</span></div>
        <div class="score-display">Puntos: <span id="ui-score">0</span></div>
    </header>

    <main id="container"></main>

    <script>
        // Datos de Actividades
        const anagrams = [
            { w: "VALENCIA", h: "Capa externa del átomo donde ocurre la magia del enlace." },
            { w: "IONICO", h: "Enlace basado en la transferencia (el arte de dar)." },
            { w: "COVALENTE", h: "Enlace basado en compartir electrones." },
            { w: "METANO", h: "Gas CH4 común en residuos orgánicos, unido por enlaces compartidos." },
            { w: "POTASIO", h: "Elemento K del fertilizante NPK que tiende a dar un electrón." },
            { w: "ELECTRONEGATIVIDAD", h: "Capacidad de un átomo para atraer electrones hacia sí." },
            { w: "OCTETO", h: "Regla que dice que los átomos buscan tener 8 electrones externos." },
            { w: "TRANSFERENCIA", h: "Acción principal en un enlace iónico." },
            { w: "NITROGENO", h: "Elemento N del fertilizante, vital para el crecimiento del cafetal." },
            { w: "COMPARTIR", h: "Valor humano que define al enlace covalente." }
        ];

        const sentences = [
            { s: "Los electrones de valencia determinan la reactividad de un átomo", h: "Importancia de la capa externa." },
            { s: "En el enlace iónico un metal entrega electrones a un no metal", h: "Dinámica del mercado químico." },
            { s: "El agua está formada por enlaces covalentes polares", h: "Compartición de electrones en el H2O." },
            { s: "El fertilizante NPK aporta nutrientes esenciales para el suelo", h: "Relación con la agricultura del Quindío." },
            { s: "Dar electrones genera iones positivos llamados cationes", h: "Consecuencia de la generosidad atómica." },
            { s: "Compartir nos hace más fuertes en la comunidad y en la química", h: "Valor de la colaboración." },
            { s: "La sal común es un cristal unido por fuerzas iónicas", h: "Ejemplo clásico de transferencia." },
            { s: "Los no metales comparten electrones para alcanzar estabilidad", h: "Estrategia del enlace covalente." },
            { s: "La empatía es el puente de unión entre los seres humanos", h: "Reflexión sobre los enlaces sociales." },
            { s: "El modelo de Bohr muestra los electrones en órbitas circulares", h: "Representación clásica del átomo." }
        ];

        let totalScore = 0;
        let attempts = {};

        // 4. Validación Final y Simulación de Flujo
        function fisherYates(str, isSentence = false) {
            let arr = isSentence ? str.split(' ') : str.split('');
            let original = str;
            do {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            } while (arr.join(isSentence ? ' ' : '') === original);
            return isSentence ? arr.join(' / ') : arr.join('-').toUpperCase();
        }

        function doLogin() {
            const n = document.getElementById('name').value.trim();
            const l = document.getElementById('lastname').value.trim();
            if (n && l) {
                const user = `${n} ${l}`;
                localStorage.setItem('ova_8_user', user);
                loadApp(user);
            }
        }

        function loadApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('ui-user').innerText = user;
            
            const savedScore = localStorage.getItem('ova_8_score');
            if(savedScore) {
                totalScore = parseFloat(savedScore);
                document.getElementById('ui-score').innerText = totalScore;
            }
            renderActivities();
        }

        function renderActivities() {
            const container = document.getElementById('container');
            container.innerHTML = "<h1>Unidad: Enlaces y Convivencia</h1>";

            anagrams.forEach((item, i) => {
                const id = `ana_${i}`;
                attempts[id] = 0;
                container.innerHTML += `
                    <div class="activity-box" id="box-${id}">
                        <h3>Actividad ${i+1}: Descifra el Concepto</h3>
                        <p class="hint">Pista: ${item.h}</p>
                        <span class="scrambled">${fisherYates(item.w)}</span>
                        <input type="text" id="in-${id}" placeholder="Escribe la palabra...">
                        <button onclick="checkAnswer('${id}', '${item.w}', true)" id="btn-${id}">Validar</button>
                        <div id="feed-${id}" class="feedback"></div>
                    </div>
                `;
            });

            sentences.forEach((item, i) => {
                const id = `sen_${i}`;
                attempts[id] = 0;
                container.innerHTML += `
                    <div class="activity-box" id="box-${id}">
                        <h3>Actividad ${i+11}: Reconstrucción de Saberes</h3>
                        <p class="hint">Pista: ${item.h}</p>
                        <p style="color:#00796b"><strong>Mezcla:</strong> ${fisherYates(item.s, true)}</p>
                        <input type="text" id="in-${id}" placeholder="Escribe la frase completa...">
                        <button onclick="checkAnswer('${id}', '${item.s}', false)" id="btn-${id}">Validar Frase</button>
                        <div id="feed-${id}" class="feedback"></div>
                    </div>
                `;
            });
        }

        function checkAnswer(id, correct, isWord) {
            const input = document.getElementById(`in-${id}`);
            const userVal = input.value.trim().toLowerCase().replace(/[.,]/g, "");
            const correctVal = correct.toLowerCase().replace(/[.,]/g, "");
            
            attempts[id]++;
            const feed = document.getElementById(`feed-${id}`);

            if(userVal === correctVal) {
                let p = 0; let s = ""; let c = "";
                if(attempts[id] === 1) { p = 5; s = "Au"; c = "ins-Au"; }
                else if(attempts[id] === 2) { p = 3; s = "Ag"; c = "ins-Ag"; }
                else { p = 1.5; s = "Fe"; c = "ins-Fe"; }

                totalScore += p;
                document.getElementById('ui-score').innerText = totalScore;
                localStorage.setItem('ova_8_score', totalScore);

                feed.innerHTML = `<span style="color:green">¡Correcto! +${p}</span> <span class="insignia ${c}">${s}</span>`;
                document.getElementById(`btn-${id}`).disabled = true;
                input.disabled = true;
                document.getElementById(`box-${id}`).classList.add('completed');
            } else {
                if(attempts[id] >= 3) {
                    feed.innerHTML = `<span style="color:red">Intentos agotados. Era: ${correct}</span>`;
                    document.getElementById(`btn-${id}`).disabled = true;
                    input.disabled = true;
                } else {
                    feed.innerHTML = `<span style="color:orange">Cerca... Intento ${attempts[id]}/3</span>`;
                }
            }
        }

        window.onload = () => {
            const u = localStorage.getItem('ova_8_user');
            if(u) loadApp(u);
        };
    </script>
</body>
</html>
