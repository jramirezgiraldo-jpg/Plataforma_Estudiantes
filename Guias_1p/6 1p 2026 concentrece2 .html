<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVA: Laboratorio de Mezclas - Grado 6°</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #ffd700;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo Glassmorphism */
        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }

        .stats-bar {
            width: 95%;
            max-width: 900px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Grilla 7x7 */
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            max-width: 1000px;
            width: 95%;
        }

        /* Animación 3D de Cartas */
        .card {
            aspect-ratio: 3/4;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 5px;
            font-size: 0.75rem;
            border: 1px solid var(--glass-border);
        }

        .card-front {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            font-size: 2rem;
            color: var(--accent);
        }

        .card-back {
            background: var(--glass);
            transform: rotateY(180deg);
        }

        /* Modales */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 80%;
            margin: 15px 0;
        }

        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(5, 1fr); } /* Ajuste móvil */
            .card-back { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="modal">
        <div class="glass-container" style="max-width: 400px;">
            <h2>Laboratorio Virtual</h2>
            <p>Tema: Sustancias y Mezclas</p>
            <input type="text" id="playerName" placeholder="Nombre y Apellido">
            <button onclick="initGame()">Comenzar Reto</button>
        </div>
    </div>

    <div class="stats-bar glass-container">
        <span>👨‍🔬: <span id="statName">-</span></span>
        <span>🔄 Intentos: <span id="statAttempts">0</span></span>
        <span>✅ Aciertos: <span id="statMatches">0</span>/24</span>
        <span>📝 Nota: <span id="statGrade">5.0</span></span>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div id="victory-screen" class="modal hidden">
        <div class="glass-container">
            <h2 id="rankTitle">¡Excelente!</h2>
            <p id="finalStats"></p>
            <button onclick="downloadResults()">Descargar Reporte .txt</button>
            <button onclick="location.reload()" style="background:#27ae60; margin-left:10px;">Reiniciar</button>
        </div>
    </div>

    <script>
        const themes = [
            {p1: "Sal (NaCl)", p2: "Compuesto: Sodio + Cloro"},
            {p1: "Agua (H2O)", p2: "Compuesto: Hidrógeno + Oxígeno"},
            {p1: "Hierro (Fe)", p2: "Elemento Químico Puro"},
            {p1: "Agua y Aceite", p2: "Mezcla Heterogénea (2 fases)"},
            {p1: "Lavado del Café", p2: "Separación Mezcla Heterogénea"},
            {p1: "Agua de Panela", p2: "Mezcla Homogénea (Solución)"},
            {p1: "Panela", p2: "Soluto (lo que se disuelve)"},
            {p1: "Agua", p2: "Solvente Universal"},
            {p1: "Ensalada", p2: "Mezcla Heterogénea Doméstica"},
            {p1: "Sustancia Pura", p2: "No se puede separar físicamente"},
            {p1: "Oro (Au)", p2: "Elemento (Sustancia Pura)"},
            {p1: "Aire", p2: "Mezcla Homogénea de Gases"},
            {p1: "Tierra y Agua", p2: "Se ven las fases (Heterogénea)"},
            {p1: "Alimentación Sana", p2: "Frutas y verduras (Compuestos naturales)"},
            {p1: "Escucha Activa", p2: "Clave para el trabajo en equipo"},
            {p1: "Compartir la mesa", p2: "Espacio de unión y diálogo"},
            {p1: "Evaporación", p2: "Método para recuperar el soluto"},
            {p1: "Filtración", p2: "Separar sólidos de líquidos"},
            {p1: "Fase Dispersa", p2: "Componente en menor cantidad"},
            {p1: "Fase Dispersante", p2: "Componente en mayor cantidad"},
            {p1: "Sangre", p2: "Mezcla que parece homogénea (Coloide)"},
            {p1: "Dióxido de Carbono", p2: "Compuesto exhalado al respirar"},
            {p1: "Jugo de naranja", p2: "Ejemplo de Mezcla Homogénea"},
            {p1: "Gelatina", p2: "Mezcla Homogénea doméstica"}
        ];

        let cards = [];
        let flipped = [];
        let attempts = 0;
        let matches = 0;
        let playerName = "";

        function initGame() {
            playerName = document.getElementById('playerName').value;
            if(!playerName) return alert("Por favor, ingresa tu nombre.");
            
            localStorage.setItem('studentName', playerName);
            document.getElementById('statName').innerText = playerName;
            document.getElementById('login-screen').classList.add('hidden');
            
            // Crear baraja
            let deck = [];
            themes.forEach((t, i) => {
                deck.push({text: t.p1, id: i}, {text: t.p2, id: i});
            });
            deck.push({text: "💡 COMODÍN: El café es el alma del Quindío.", id: 'joker'});
            
            deck.sort(() => Math.random() - 0.5);
            
            const grid = document.getElementById('gameGrid');
            deck.forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">⚛️</div>
                        <div class="card-back">${data.text}</div>
                    </div>
                `;
                card.onclick = () => handleFlip(card, data);
                grid.appendChild(card);
            });
        }

        function handleFlip(el, data) {
            if (flipped.length < 2 && !el.classList.contains('flipped')) {
                el.classList.add('flipped');
                
                if(data.id === 'joker') {
                    alert("¡DATO CURIOSO! El café de nuestra finca es una mezcla de cientos de compuestos orgánicos.");
                    setTimeout(() => el.classList.remove('flipped'), 1500);
                    return;
                }
                
                flipped.push({el, data});
                
                if (flipped.length === 2) {
                    attempts++;
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [c1, c2] = flipped;
            if (c1.data.id === c2.data.id) {
                matches++;
                flipped = [];
                if (matches === 24) showVictory();
            } else {
                setTimeout(() => {
                    c1.el.classList.remove('flipped');
                    c2.el.classList.remove('flipped');
                    flipped = [];
                }, 1000);
            }
            updateStats();
        }

        function updateStats() {
            let grade = 5.0;
            if (attempts > 24) {
                grade = 5.0 - ((attempts - 24) * 0.1);
            }
            grade = Math.max(1.0, grade).toFixed(1);
            document.getElementById('statAttempts').innerText = attempts;
            document.getElementById('statMatches').innerText = matches;
            document.getElementById('statGrade').innerText = grade;
        }

        function showVictory() {
            const grade = document.getElementById('statGrade').innerText;
            let rank = "";
            if(grade >= 4.5) rank = "Nivel Investigador Senior 🏆";
            else if(grade >= 3.5) rank = "Nivel Asistente de Laboratorio 🧪";
            else rank = "Nivel Aprendiz de Ciencias 🔍";

            document.getElementById('rankTitle').innerText = rank;
            document.getElementById('finalStats').innerText = `Estudiante: ${playerName} | Nota: ${grade}`;
            document.getElementById('victory-screen').classList.remove('hidden');
        }

        function downloadResults() {
            const grade = document.getElementById('statGrade').innerText;
            const text = `REPORTE DE CIENCIAS - GRADO 6\n` +
                         `Institución: Ramón Messa Londoño\n` +
                         `----------------------------------\n` +
                         `Estudiante: ${playerName}\n` +
                         `Fecha: ${new Date().toLocaleString()}\n` +
                         `Intentos: ${attempts}\n` +
                         `Aciertos: ${matches}/24\n` +
                         `Nota Final: ${grade}\n` +
                         `----------------------------------`;
            const blob = new Blob([text], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Resultado_${playerName.replace(/ /g,'_')}.txt`;
            link.click();
        }

        window.onload = () => {
            const saved = localStorage.getItem('studentName');
            if(saved) document.getElementById('playerName').value = saved;
        };
    </script>
</body>
</html>
