<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crucigrama: Reacciones Pericíclicas y Armonía</title>
    <style>
        :root { --cafe: #4e342e; --ambar: #ffb300; --fondo: #fff8e1; --verde: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--cafe); }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(78, 52, 46, 0.2); max-width: 950px; width: 100%; }
        h1 { color: var(--cafe); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        h4 { text-align: center; color: var(--verde); margin-top: 0; font-style: italic; }
        .grid-container { display: flex; justify-content: center; margin: 25px 0; }
        .grid { display: grid; grid-template-columns: repeat(15, 34px); grid-template-rows: repeat(15, 34px); gap: 2px; background: #d7ccc8; border: 4px solid var(--cafe); }
        .cell { background: #bcaaa4; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; position: relative; }
        .cell.active { background: white; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 16px; font-weight: bold; text-transform: uppercase; background: transparent; color: var(--cafe); }
        .cell input:focus { background: #fff9c4; outline: none; }
        .num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8d6e63; pointer-events: none; }
        .clues { display: flex; gap: 20px; margin-top: 25px; }
        .clue-col { flex: 1; background: #fafafa; padding: 15px; border-radius: 12px; border-top: 5px solid var(--ambar); }
        h3 { color: var(--cafe); margin-top: 0; border-bottom: 1px solid #eee; }
        li { font-size: 12.5px; margin-bottom: 10px; list-style: none; line-height: 1.3; }
        #win-msg { display: none; text-align: center; color: var(--verde); font-weight: bold; padding: 20px; border: 3px solid var(--verde); border-radius: 15px; margin-top: 20px; background: #e8f5e9; }
    </style>
</head>
<body>

<div class="card">
    <h1>Química de la Esencia: Reacciones Pericíclicas</h1>
    <h4>Ciclaciones, Aromas y Precisión Técnica en Quindío</h4>

    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="win-msg">¡Excelente trabajo, Químico! Has descifrado la armonía de los reordenamientos moleculares.</div>

    <div class="clues">
        <div class="clue-col">
            <h3>Horizontales</h3>
            <ul id="hor-clues"></ul>
        </div>
        <div class="clue-col">
            <h3>Verticales</h3>
            <ul id="ver-clues"></ul>
        </div>
    </div>
</div>

<script>
    const data = [
        [1, 4, "PERICICLICA", "Reacción que ocurre a través de un estado de transición cíclico.", "H"],
        [4, 2, "DIELSALDER", "Ciclación [4+2] famosa para formar anillos de seis miembros.", "H"],
        [6, 7, "AROMA", "Propiedad de moléculas del café y cítricos ligada a su estructura.", "H"],
        [8, 1, "HONESTIDAD", "Valor clave al rotular agroinsumos y productos de limpieza.", "H"],
        [10, 5, "SIGMATROPICO", "Reordenamiento donde un enlace sigma se desplaza.", "H"],
        [12, 3, "IUPAC", "Sistema de reglas para nombrar productos técnicos con precisión.", "H"],
        [14, 6, "CONCERTADA", "Reacción donde todos los enlaces se rompen y forman a la vez.", "H"],
        [0, 6, "CICLACION", "Proceso de formación de un anillo en una molécula.", "V"],
        [3, 3, "ELECTRO", "Tipo de reacción cíclica inducida por luz o calor (Electrocíclica).", "V"],
        [3, 10, "TERPENO", "Compuesto orgánico presente en los cítricos de la vereda.", "V"],
        [5, 13, "ESTADO", "En estas reacciones, el __ de transición es cíclico.", "V"],
        [7, 5, "QUINDIO", "Nuestro territorio, rico en esencias y procesos naturales.", "V"],
        [1, 1, "CAFÉ", "Producto local con cientos de moléculas aromáticas complejas.", "V"],
        [9, 9, "ROTULO", "Etiqueta técnica que debe ser precisa y veraz.", "V"],
        [11, 2, "ARMONIA", "Valoración del equilibrio en los procesos de la naturaleza.", "V"]
    ];

    const gridDiv = document.getElementById('grid');
    for(let r=0; r<15; r++) {
        for(let c=0; c<15; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `c-${r}-${c}`;
            gridDiv.appendChild(cell);
        }
    }

    data.forEach((item, index) => {
        let [r, c, word, clue, dir] = item;
        const list = document.getElementById(dir === 'H' ? 'hor-clues' : 'ver-clues');
        const li = document.createElement('li');
        li.innerHTML = `<b>${index + 1}.</b> ${clue}`;
        list.appendChild(li);

        for(let i=0; i<word.length; i++) {
            let currR = dir === 'H' ? r : r + i;
            let currC = dir === 'H' ? c + i : c;
            let cell = document.getElementById(`c-${currR}-${currC}`);
            cell.classList.add('active');
            if(!cell.querySelector('input')) {
                const input = document.createElement('input');
                input.maxLength = 1;
                input.dataset.answer = word[i];
                cell.appendChild(input);
                const num = document.createElement('span');
                num.className = 'num';
                num.innerText = index + 1;
                cell.appendChild(num);
            }
        }
    });

    gridDiv.addEventListener('input', (e) => {
        e.target.style.color = e.target.value.toUpperCase() === e.target.dataset.answer ? "#2e7d32" : "#c62828";
        const inputs = document.querySelectorAll('input');
        if(Array.from(inputs).every(i => i.value.toUpperCase() === i.dataset.answer)) {
            document.getElementById('win-msg').style.display = 'block';
        }
    });
</script>
</body>
</html>
