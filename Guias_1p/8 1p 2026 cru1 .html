<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crucigrama: Recombinación y Potencial</title>
    <style>
        :root { --naranja: #e65100; --tierra: #5d4037; --hoja: #388e3c; --bg: #fff3e0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: var(--tierra); }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(93, 64, 55, 0.2); max-width: 950px; width: 100%; }
        h1 { color: var(--naranja); text-align: center; margin-bottom: 5px; }
        h4 { text-align: center; color: var(--hoja); margin-top: 0; font-style: italic; }
        .grid-container { display: flex; justify-content: center; margin: 25px 0; }
        .grid { display: grid; grid-template-columns: repeat(15, 34px); grid-template-rows: repeat(15, 34px); gap: 2px; background: #d7ccc8; border: 4px solid var(--tierra); }
        .cell { background: #8d6e63; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; position: relative; }
        .cell.active { background: white; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 18px; font-weight: bold; text-transform: uppercase; background: transparent; color: var(--tierra); }
        .cell input:focus { background: #ffe0b2; outline: none; }
        .num { position: absolute; top: 1px; left: 2px; font-size: 10px; color: #a1887f; pointer-events: none; }
        .clues { display: flex; gap: 20px; margin-top: 25px; }
        .clue-col { flex: 1; background: #efebe9; padding: 15px; border-radius: 12px; border-top: 5px solid var(--naranja); }
        h3 { color: var(--tierra); margin-top: 0; }
        li { font-size: 13.5px; margin-bottom: 12px; list-style: none; }
        #win-msg { display: none; text-align: center; color: var(--hoja); font-weight: bold; padding: 20px; border: 3px dashed var(--hoja); border-radius: 15px; margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="card">
    <h1>La Magia de la Recombinación</h1>
    <h4>Transformando átomos, mejorando el campo</h4>

    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="win-msg">¡Excelente! Has entendido que los átomos, como nosotros, tienen un potencial infinito para crear algo nuevo.</div>

    <div class="clues">
        <div class="clue-col">
            <h3>Horizontales</h3>
            <ul id="hor-clues"></ul>
        </div>
        <div class="clue-col">
            <h3>Verticales</h3>
            <ul id="ver-clues"></ul>
        </div>
    </div>
</div>

<script>
    const data = [
        [1, 2, "REACCION", "Proceso donde los átomos se rompen y se vuelven a unir.", "H"],
        [4, 5, "POTENCIAL", "Lo que tengo para dar a los demás (como mis electrones).", "H"],
        [6, 1, "VALENCIA", "Electrones de la capa más externa, encargados de la magia.", "H"],
        [9, 4, "NITROGENO", "Elemento del N-P-K clave para el verdor de la planta (N).", "H"],
        [11, 0, "PRODUCTO", "La sustancia nueva que se forma tras la recombinación.", "H"],
        [13, 7, "POTASIO", "Elemento K que ayuda a la planta a resistir cambios.", "H"],
        [0, 8, "BOHR", "Modelo usado para dibujar las capas del N-P-K.", "V"],
        [3, 2, "REACTIVO", "Sustancia inicial que se va a transformar.", "V"],
        [5, 5, "FOSFORO", "Elemento P del fertilizante vital para las raíces.", "V"],
        [2, 11, "REORDENAR", "Acción de cambiar de lugar los átomos en una reacción.", "V"],
        [7, 13, "ENERGIA", "Se necesita para romper enlaces y crear nuevos.", "V"],
        [1, 4, "ATOMO", "Pieza básica de construcción en nuestro juego de fichas.", "V"],
        [10, 2, "UNIÓN", "Lo que mantiene a los átomos juntos en una molécula.", "V"],
        [8, 9, "NUEVO", "Tipo de comienzo que surge tras una transformación.", "V"],
        [11, 11, "DAR", "Acción de compartir electrones con otro elemento.", "V"]
    ];

    const gridDiv = document.getElementById('grid');
    for(let r=0; r<15; r++) {
        for(let c=0; c<15; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `c-${r}-${c}`;
            gridDiv.appendChild(cell);
        }
    }

    data.forEach((item, index) => {
        let [r, c, word, clue, dir] = item;
        const list = document.getElementById(dir === 'H' ? 'hor-clues' : 'ver-clues');
        const li = document.createElement('li');
        li.innerHTML = `<b>${index + 1}.</b> ${clue}`;
        list.appendChild(li);

        for(let i=0; i<word.length; i++) {
            let currR = dir === 'H' ? r : r + i;
            let currC = dir === 'H' ? c + i : c;
            let cell = document.getElementById(`c-${currR}-${currC}`);
            cell.classList.add('active');
            if(!cell.querySelector('input')) {
                const input = document.createElement('input');
                input.maxLength = 1;
                input.dataset.answer = word[i];
                cell.appendChild(input);
                const num = document.createElement('span');
                num.className = 'num';
                num.innerText = index + 1;
                cell.appendChild(num);
            }
        }
    });

    gridDiv.addEventListener('input', (e) => {
        e.target.style.color = e.target.value.toUpperCase() === e.target.dataset.answer ? "#388e3c" : "#d32f2f";
        const inputs = document.querySelectorAll('input');
        if(Array.from(inputs).every(i => i.value.toUpperCase() === i.dataset.answer)) {
            document.getElementById('win-msg').style.display = 'block';
        }
    });
</script>
</body>
</html>
