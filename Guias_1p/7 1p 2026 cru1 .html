<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crucigrama: El Átomo y sus Familias</title>
    <style>
        :root { --primario: #1a237e; --acentuado: #00bcd4; --bg: #f5f5f5; --texto: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--texto); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 900px; width: 100%; }
        h1 { color: var(--primario); text-align: center; border-bottom: 3px solid var(--acentuado); padding-bottom: 10px; }
        .grid-container { display: flex; justify-content: center; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(15, 32px); grid-template-rows: repeat(15, 32px); gap: 2px; background: #ddd; border: 4px solid var(--primario); }
        .cell { background: #555; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; position: relative; }
        .cell.active { background: white; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 16px; font-weight: bold; text-transform: uppercase; background: transparent; color: var(--primario); }
        .cell input:focus { background: #e0f7fa; outline: none; }
        .num { position: absolute; top: 1px; left: 1px; font-size: 9px; color: #888; pointer-events: none; }
        .clues { display: flex; gap: 20px; margin-top: 20px; }
        .clue-col { flex: 1; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        h3 { color: var(--primario); border-left: 4px solid var(--acentuado); padding-left: 8px; }
        li { font-size: 13px; margin-bottom: 10px; line-height: 1.4; }
        #win-msg { display: none; text-align: center; color: #2e7d32; font-weight: bold; padding: 15px; border: 2px solid #2e7d32; border-radius: 10px; margin-top: 15px; background: #e8f5e9; }
    </style>
</head>
<body>

<div class="card">
    <h1>Estructura Atómica y Familias Químicas</h1>
    <p style="text-align: center;">Compara el átomo con el universo y descubre a qué grupo perteneces.</p>

    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="win-msg">¡Increíble! Has dominado los modelos de Bohr y Lewis. ¡Todos somos parte de un grupo!</div>

    <div class="clues">
        <div class="clue-col">
            <h3>Horizontales</h3>
            <ul id="hor-clues"></ul>
        </div>
        <div class="clue-col">
            <h3>Verticales</h3>
            <ul id="ver-clues"></ul>
        </div>
    </div>
</div>

<script>
    const data = [
        [1, 5, "BOHR", "Modelo que parece un sistema solar en miniatura.", "H"],
        [4, 2, "VALENCIA", "Electrones en la última capa; los que forman enlaces.", "H"],
        [6, 7, "LEWIS", "Representación que usa puntos como 'brazos' de enlace.", "H"],
        [8, 1, "FAMILIA", "Grupo de elementos con características similares.", "H"],
        [10, 5, "EMPATIA", "Valor de reconocer que todos pertenecemos a un grupo.", "H"],
        [12, 3, "NUCLEO", "Centro del átomo donde están protones y neutrones.", "H"],
        [14, 0, "ELECTRON", "Partícula con carga negativa que orbita el núcleo.", "H"],
        [0, 6, "ORBITA", "Camino que siguen los electrones en el modelo de Bohr.", "V"],
        [3, 3, "PLANETA", "En la analogía de Bohr, el electrón se parece a un...", "V"],
        [3, 10, "PUNTOS", "Símbolos usados en Lewis para mostrar electrones externos.", "V"],
        [5, 13, "GRUPOS", "Columnas de la tabla periódica donde viven las familias.", "V"],
        [7, 5, "SOLAR", "Tipo de sistema con el que comparamos al átomo.", "V"],
        [1, 1, "ATOMO", "Unidad básica de la materia.", "V"],
        [9, 8, "ENLACE", "Fuerza que une a dos elementos para formar compuestos.", "V"],
        [10, 11, "PROTON", "Partícula positiva ubicada en el centro del átomo.", "V"]
    ];

    const gridDiv = document.getElementById('grid');
    for(let r=0; r<15; r++) {
        for(let c=0; c<15; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `c-${r}-${c}`;
            gridDiv.appendChild(cell);
        }
    }

    data.forEach((item, index) => {
        let [r, c, word, clue, dir] = item;
        const list = document.getElementById(dir === 'H' ? 'hor-clues' : 'ver-clues');
        const li = document.createElement('li');
        li.innerHTML = `<b>${index + 1}.</b> ${clue}`;
        list.appendChild(li);

        for(let i=0; i<word.length; i++) {
            let currR = dir === 'H' ? r : r + i;
            let currC = dir === 'H' ? c + i : c;
            let cell = document.getElementById(`c-${currR}-${currC}`);
            cell.classList.add('active');
            if(!cell.querySelector('input')) {
                const input = document.createElement('input');
                input.maxLength = 1;
                input.dataset.answer = word[i];
                cell.appendChild(input);
                if(i === 0 || !cell.querySelector('.num')) {
                    const num = document.createElement('span');
                    num.className = 'num';
                    num.innerText = index + 1;
                    cell.appendChild(num);
                }
            }
        }
    });

    gridDiv.addEventListener('input', (e) => {
        e.target.style.color = e.target.value.toUpperCase() === e.target.dataset.answer ? "#2e7d32" : "#c62828";
        const inputs = document.querySelectorAll('input');
        if(Array.from(inputs).every(i => i.value.toUpperCase() === i.dataset.answer)) {
            document.getElementById('win-msg').style.display = 'block';
        }
    });
</script>
</body>
</html>
