{% extends "base.html" %}

{% block content %}
<div class="auth-container card">
    <div class="auth-header">
        <h2>Crear una Cuenta</h2>
        <p>Regístrate para ver tus misiones y materiales.</p>
    </div>
    
    <form action="{{ url_for('register') }}" method="POST" class="auth-form">
        <div class="form-group">
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" name="name" placeholder="ej. Juan Perez" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="username">Nombre de Usuario (Login)</label>
            <input type="text" id="username" name="username" placeholder="ej. juan_perez" required>
            <small class="hint">Usa este nombre para entrar luego.</small>
        </div>
        
        <div class="form-group">
            <label for="grade">Grado Escolar</label>
            <select id="grade" name="grade" required>
                <option value="" disabled selected>Selecciona tu grado</option>
                <option value="6">Sexto (6°)</option>
                <option value="7">Séptimo (7°)</option>
                <option value="8">Octavo (8°)</option>
                <option value="9">Noveno (9°)</option>
                <option value="10">Décimo (10°)</option>
                <option value="11">Once (11°)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Crea una contraseña segura" required>
        </div>
        
        <button type="submit" class="btn-primary full-width">Registrarme</button>
    </form>
    
    <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
    </div>
</div>
{% endblock %}
