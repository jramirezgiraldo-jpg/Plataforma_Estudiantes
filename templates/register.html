{% extends "base.html" %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card fade-in" style="border-top: 5px solid var(--accent-success);">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">
                {% if portal == 'student' %}🎒{% elif portal == 'parent' %}👪{% else %}👨‍🏫{% endif %}
            </div>
            <h2 style="font-size: 2rem; font-weight: 800; color: var(--primary-color);">Registro: {{ portal|capitalize }}</h2>
            <p style="color: var(--text-muted);">Crea tu cuenta profesional en segundos.</p>
        </div>

        <form method="POST" action="{{ url_for('register', portal=portal) }}">
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Nombre Completo</label>
                <input type="text" name="name" class="form-input" placeholder="Nombre completo" required>
            </div>

            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Usuario / ID Global</label>
                <input type="text" name="username" class="form-input" placeholder="Nombre de usuario" required>
            </div>
            
            {% if portal == 'student' %}
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Grado Académico</label>
                <select name="grade" class="form-input" required>
                    <option value="" disabled selected>Selecciona tu grado</option>
                    {% for g in [6, 7, 8, 9, 10, 11] %}
                    <option value="{{ g }}">Grado {{ g }}°</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Contraseña de Alta Seguridad</label>
                <input type="password" name="password" class="form-input" placeholder="Crea tu clave" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; background: var(--accent-success);">
                Registrar {{ portal|capitalize }}
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                <a href="{{ url_for('index') }}" style="color: var(--text-muted); text-decoration: none;">← Volver al Inicio</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
