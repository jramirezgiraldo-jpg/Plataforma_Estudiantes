{% extends "base.html" %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card fade-in" style="border-top: 5px solid var(--primary-color);">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">
                {% if portal == 'student' %}🎒{% elif portal == 'parent' %}👪{% else %}👨‍🏫{% endif %}
            </div>
            <h2 style="font-size: 2rem; font-weight: 800; color: var(--primary-color);">Portal {{ portal|capitalize }}</h2>
            <p style="color: var(--text-muted);">Ingresa tus credenciales de acceso global.</p>
        </div>

        <form method="POST" action="{{ url_for('portal_login', portal=portal) }}">
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Usuario / ID</label>
                <input type="text" name="username" class="form-input" placeholder="Tu usuario" required>
            </div>
            
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Contraseña Segura</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">
                Iniciar Sesión en {{ portal|capitalize }}
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                <a href="{{ url_for('index') }}" style="color: var(--text-muted); text-decoration: none;">← Volver al Inicio</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
