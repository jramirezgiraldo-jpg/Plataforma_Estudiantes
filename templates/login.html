{% extends "base.html" %}

{% block content %}
<div class="auth-container card">
    <div class="auth-header">
        <h2>Bienvenido de Vuelta</h2>
        <p>Ingresa tus datos para continuar a tus misiones.</p>
    </div>
    
    <form action="{{ url_for('login') }}" method="POST" class="auth-form">
        <div class="form-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" name="username" placeholder="ej. juan_perez" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-primary full-width">Ingresar a la Plataforma</button>
    </form>
    
    <div class="auth-footer">
        <p>¿No tienes una cuenta aún? <a href="{{ url_for('register') }}">Regístrate aquí</a></p>
    </div>
</div>
{% endblock %}
